name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        os: [ubuntu-latest]
        dependency-versions: ['lowest', 'highest']
    runs-on: ${{ matrix.os }}
    name: Tests on PHP ${{ matrix.php-version }} with ${{ matrix.dependency-versions }} dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Setup problem matchers for PHP
        run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - name: Setup problem matchers for PHPUnit
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - uses: "ramsey/composer-install@a8d0d959dab41457692a5e2041bd9b757a119e3f" # v3
        with:
          dependency-versions: ${{ matrix.dependency-versions }}

      - name: Run test suite
        run: composer run-script test

  # Smoke-test the SDK against Symfony HttpClient as the discovered PSR-18
  # implementation, ensuring the discovery + integration path doesn't
  # regress on a non-Guzzle stack. Single PHP version is sufficient since
  # the SDK doesn't reference symfony types directly.
  tests-symfony:
    runs-on: ubuntu-latest
    name: Tests with Symfony HttpClient (PSR-18)
    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'

      - name: Swap PSR-18 implementation to Symfony HttpClient
        run: |
          composer remove --dev --no-update guzzlehttp/guzzle
          composer require --dev --no-update \
            "symfony/http-client:^6.0 || ^7.0" \
            "nyholm/psr7:^1.0"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run test suite
        run: composer run-script test

  static-analysis:
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.5']
        os: [ubuntu-latest]
        dependency-versions: ['highest']
    runs-on: ${{ matrix.os }}
    name: PHPStan on PHP ${{ matrix.php-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Setup problem matchers for PHP
        run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - uses: "ramsey/composer-install@a8d0d959dab41457692a5e2041bd9b757a119e3f" # v3
        with:
          dependency-versions: ${{ matrix.dependency-versions }}

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi
